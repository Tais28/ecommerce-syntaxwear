<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntaxwear - Loja de Tênis</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <a class="skip-link" href="#main">Pular para o conteúdo</a>

    <header class="site-header header" role="banner">
        <div class="container header-inner">
            <a href="/" class="logo" aria-label="Syntaxwear">
                <img src="images/logo.svg" alt="Syntaxwear">
            </a>
            <nav class="main-nav" role="navigation" aria-label="Navegação principal">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#categories">Categorias</a></li>
                    <li><a href="#featured">Destaques</a></li>
                    <li><a href="#contact">Contato</a></li>
                </ul>
            </nav>
            <div class="header-actions" aria-hidden="true"></div>
        </div>
    </header>

    <main id="main" role="main">
        <section id="hero" class="hero" aria-label="Seção hero">
            <!-- Estrutura macro: conteúdo do hero será adicionado aqui -->
        </section>

        <section id="categories" class="categories" aria-label="Categorias de tênis">
            <!-- Estrutura macro: categorias de tênis -->
        </section>

        <section id="featured" class="featured-products" aria-label="Produtos em destaque">
            <!-- Estrutura macro: grid de produtos em destaque -->
        </section>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="container footer-inner" id="contact">
            <!-- Estrutura macro: informações de contato e links -->
        </div>
    </footer>

</body>

</html>
